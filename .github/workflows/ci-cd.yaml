name: Digital FTE Agent CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest pytest-asyncio pytest-cov black flake8 mypy

    - name: Lint and Format Check
      run: |
        black --check backend/src
        flake8 backend/src
        mypy backend/src

    - name: Run Unit & Integration Tests
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/test_db
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        REDIS_URL: redis://localhost:6379/0
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
        pytest backend/tests/unit backend/tests/integration --cov=backend/src --cov-report=xml

    - name: Performance & Validation Check
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/test_db
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
        python benchmark_performance.py

  build-and-deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Build and Push Docker Image
      run: |
        # In actual implementation:
        # docker build -t digital-fte-agent:latest .
        # docker push digital-fte-agent:latest
        echo "Building and pushing production docker images..."

    - name: Deploy to Kubernetes
      run: |
        # In actual implementation:
        # kubectl apply -f k8s/deployments/
        echo "Updating Kubernetes deployments for zero-downtime rolling update..."

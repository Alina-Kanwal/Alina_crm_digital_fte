apiVersion: apps/v1
kind: Deployment
metadata:
  name: digital-fte-frontend
  namespace: default
  labels:
    app: digital-fte-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: digital-fte-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: digital-fte-frontend
    spec:
      containers:
      - name: frontend
        image: digital-fte-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://digital-fte-backend-service"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 40
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: digital-fte-frontend-service
  namespace: default
  labels:
    app: digital-fte-frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: digital-fte-frontend

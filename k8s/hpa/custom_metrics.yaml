---
# Horizontal Pod Autoscaler (HPA) for Kafka Consumers based on custom metrics
# Uses Prometheus Adapter to expose custom metrics for queue depth
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: digital-fte-consumers-hpa-queue-depth
  namespace: default
  labels:
    app: digital-fte-consumers
    component: message-consumer
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: digital-fte-consumers
  minReplicas: 3
  maxReplicas: 10
  metrics:
  # Scale based on Kafka consumer lag (queue depth)
  - type: Pods
    pods:
      metric:
        name: kafka_consumer_lag_messages
      target:
        type: AverageValue
        averageValue: "10000"
  # Scale based on consumer group lag
  - type: External
    external:
      metric:
        name: kafka_consumer_group_lag_bytes
      target:
        type: AverageValue
        averageValue: "10485760"  # 10MB
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600  # 10 minutes before scaling down
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 1
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0   # Scale up immediately
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max
---
# HPA for Celery Workers based on custom metrics
# Scales based on Celery queue depth
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: digital-fte-workers-hpa-queue-depth
  namespace: default
  labels:
    app: digital-fte-workers
    component: background-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: digital-fte-workers
  minReplicas: 2
  maxReplicas: 5
  metrics:
  # Scale based on Celery task queue length
  - type: Pods
    pods:
      metric:
        name: celery_queue_length_tasks
      target:
        type: AverageValue
        averageValue: "50"
  # Scale based on pending scheduled tasks
  - type: External
    external:
      metric:
        name: celery_scheduled_tasks_pending
      target:
        type: AverageValue
        averageValue: "10"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # 5 minutes before scaling down
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 1
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 1
        periodSeconds: 15
      selectPolicy: Max
---
# HPA for Backend based on request rate (custom metric)
# Uses Prometheus metrics for request rate
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: digital-fte-backend-hpa-request-rate
  namespace: default
  labels:
    app: digital-fte-backend
    component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: digital-fte-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  # Scale based on HTTP request rate
  - type: External
    external:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "100"
  # Scale based on request latency P95
  - type: External
    external:
      metric:
        name: http_request_latency_p95_seconds
      target:
        type: AverageValue
        averageValue: "2"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 30
        periodSeconds: 60
      - type: Pods
        value: 1
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max

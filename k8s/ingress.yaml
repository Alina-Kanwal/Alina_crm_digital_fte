---
# Ingress Controller for Digital FTE Application
# Enables external access to the backend API
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: digital-fte-ingress
  namespace: default
  annotations:
    # Use NGINX ingress controller
    kubernetes.io/ingress.class: nginx
    # SSL/TLS configuration
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    # CORS headers
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://*.example.com"
    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    # Security headers
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/content-security-policy: "default-src 'self'"
    nginx.ingress.kubernetes.io/x-frame-options: "DENY"
    nginx.ingress.kubernetes.io/x-content-type-options: "nosniff"
spec:
  tls:
  - hosts:
    - api.digital-fte.example.com
    secretName: digital-fte-tls-cert
  rules:
  - host: api.digital-fte.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: digital-fte-backend-service
            port:
              number: 80
---
# Ingress for Monitoring (Grafana, Prometheus)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: monitoring-ingress
  namespace: monitoring
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - monitoring.digital-fte.example.com
    secretName: monitoring-tls-cert
  rules:
  - host: monitoring.digital-fte.example.com
    http:
      paths:
      - path: /grafana
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
      - path: /prometheus
        pathType: Prefix
        backend:
          service:
            name: prometheus
            port:
              number: 9090

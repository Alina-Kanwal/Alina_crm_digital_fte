services:
  - type: web
    name: Alina_crm_digital_fte
    env: python
    region: singapore
    branch: 001-digital-fte-agent
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    # Gunicorn with Uvicorn workers for production reliability
    startCommand: "gunicorn src.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    plan: free
    envVars:
      - key: DATABASE_URL
        # Placeholder/Existing Neon URL - should be managed in Render Dashboard
        value: postgresql://neondb_owner:npg_jcNGEM0ghA3n@ep-cool-math-anbou7jb-pooler.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: GROQ_API_KEY
        sync: false # Must be set in Render dashboard for security
      - key: GROQ_MODEL
        value: "groq/llama-3.3-70b-versatile"
      - key: LOG_LEVEL
        value: "info"

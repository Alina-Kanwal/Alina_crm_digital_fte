services:
  - type: web
    name: Alina_crm_digital_fte
    env: python
    region: singapore
    branch: main
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    # Gunicorn with Uvicorn workers for async FastAPI
    startCommand: "gunicorn src.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120"
    plan: free
    envVars:
      - key: DATABASE_URL
        # Clean Neon URL — no channel_binding (asyncpg strips query params internally)
        value: postgresql+asyncpg://neondb_owner:npg_jcNGEM0ghA3n@ep-cool-math-anbou7jb-pooler.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: ALLOW_ORIGINS
        value: "https://alina-crm-digital-fte.vercel.app,https://digital-fte-webform.vercel.app"
      - key: GROQ_API_KEY
        sync: false  # Set this in Render Dashboard → Environment tab
      - key: GROQ_MODEL
        value: "groq/llama-3.3-70b-versatile"
      - key: LOG_LEVEL
        value: "info"
      - key: WORKERS
        value: "2"
